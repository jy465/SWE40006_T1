appId: com.jy465.tomatotasks
productName: Tomato Tasks
copyright: "Copyright 2026"

directories:
  output: dist-packages
  buildResources: build

files:
  - out/**/*
  - dist/**/*
  - package.json

asar: true

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Tomato Tasks"